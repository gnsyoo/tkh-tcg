<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0b1a">
<title>삼국 대장전 · 목업</title>
<link rel="stylesheet" href="css/common.css?v=20260616a">
<link rel="stylesheet" href="css/heroes.css?v=20260616a">
</head>
<body>
  <div class="float-menu" id="floatMenu">
    <button class="fm-toggle" id="fmToggle" title="메뉴" aria-label="메뉴">☰</button>
    <div class="fm-panel" id="fmPanel" hidden>
      <div class="fm-title">삼국 대장전</div>
      <div class="fm-info">
        <span class="pill" id="diffPill">난이도</span>
        <span class="pill" id="deckPill">덱 0</span>
      </div>
      <div class="fm-actions">
        <button class="btn ghost" id="muteBtn">🔊 소리</button>
        <a class="btn ghost" href="heroes.html">🗺️ 영웅전</a>
        <a class="btn ghost" href="index.html">← 메뉴로</a>
      </div>
    </div>
  </div>

  <main class="hw-main" id="hwMain">
    <!-- Raid selection -->
    <section class="screen" id="selectScreen">
      <h3 class="screen-title">👹 대장전 (레이드)</h3>
      <p class="screen-sub">영웅전 덱으로 거대 보스에 도전 — 격파 시 전용 장수를 획득합니다</p>
      <div class="raid-list" id="raidList"></div>
    </section>

    <!-- Combat -->
    <section class="screen" id="combatScreen" hidden>
      <div class="fx-layer" id="fxLayer"></div>
      <div class="enemy-row" id="enemyRow"></div>
      <div class="combat-mid">
        <div class="energy" id="energyBox"></div>
        <div class="combat-log" id="combatLog"></div>
      </div>
      <div class="lord-bar" id="lordBar"></div>
      <div class="combat-board">
        <div class="pile draw-pile" id="drawPile"></div>
        <div class="center-cards" id="centerCards"></div>
        <div class="pile used-pile" id="usedPile"></div>
      </div>
      <div class="action-bar" id="actionBar" hidden></div>
      <div class="combat-foot">
        <span class="hint" id="combatHint">카드로 공격하거나 방어하세요</span>
        <button class="btn primary" id="endTurnBtn">턴 종료</button>
      </div>
    </section>
  </main>

  <!-- Result -->
  <div class="overlay" id="overModal" hidden>
    <div class="modal">
      <h2 id="overTitle"></h2>
      <p id="overText"></p>
      <div id="overReward"></div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;">
        <button class="btn primary" id="overAgain">목록으로</button>
        <a class="btn ghost" href="index.html">메뉴로</a>
      </div>
    </div>
  </div>

  <script src="js/util.js?v=20260616a"></script>
  <script src="js/heroes_data.js?v=20260616a"></script>
  <script src="js/daejang.js?v=20260616a"></script>
</body>
</html>
