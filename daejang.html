<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0b1a">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RZW78R7430"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-RZW78R7430');
</script>
<title>삼국 대장전 · 목업</title>
<link rel="stylesheet" href="css/common.css?v=1.7.6">
<link rel="stylesheet" href="css/heroes.css?v=1.7.6">
</head>
<body>
  <main class="hw-main" id="hwMain">
    <!-- Raid selection (대기실 — 레이드 보라 테마) -->
    <section class="screen waitroom raid-waitroom" id="selectScreen">
      <div class="wr-top">
        <a class="wr-icbtn" href="index.html" title="홈" aria-label="홈"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 11.5L12 4l9 7.5" stroke="#f0c33c" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M5.5 10v9h13v-9" stroke="#f0c33c" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 19v-5h4v5" stroke="#f0c33c" stroke-width="1.7" stroke-linejoin="round"/></svg></a>
        <button class="wr-icbtn" id="raidGuide" title="게임 가이드" aria-label="게임 가이드"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#f0c33c" stroke-width="1.8"/><path d="M9.2 9.2a2.8 2.8 0 015.4 1c0 1.8-2.6 2.2-2.6 4" stroke="#f0c33c" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="17.4" r="1.05" fill="#f0c33c"/></svg></button>
        <div class="wr-chip gold"><img src="assets/img/heroes/coin-gold2.png?v=1.7.6" alt=""><b id="raidGold">0</b></div>
        <span class="wr-spacer"></span>
        <div class="wr-chip"><img src="assets/img/heroes/ic-general.png?v=1.7.6" alt=""><b id="rosterCount">0</b></div>
        <div class="wr-chip"><img src="assets/img/heroes/ic-swords.png?v=1.7.6" alt=""><b id="raidGear">0</b></div>
      </div>
      <div class="wr-banner raid"><span class="wr-bno">👹</span><div class="wr-btitle"><b>대장전 · 레이드</b><small data-i18n="uiRaidSub">영웅전 덱으로 거대 보스에 도전 — 보스 카드를 탭하면 정보를 봅니다.</small></div></div>
      <div class="raid-lord" id="raidLordStatus"></div>
      <div class="raid-collect">
        <button class="raid-cbtn" id="rosterBtn"><img src="assets/img/heroes/ic-general.png?v=1.7.6" alt=""><span data-i18n="uiOfficers">장수</span></button>
        <button class="raid-cbtn" id="gearBtn"><img src="assets/img/heroes/ic-swords.png?v=1.7.6" alt=""><span data-i18n="uiGear">장비</span></button>
        <button class="raid-cbtn" id="codexBtn"><img src="assets/img/heroes/ped-codex.png?v=1.7.6" alt=""><span>도감</span></button>
      </div>
      <div class="raid-list" id="raidList"></div>
    </section>

    <!-- Combat -->
    <section class="screen" id="combatScreen" hidden>
      <div class="combat-head" id="combatHead"></div>
      <div class="fx-layer" id="fxLayer"></div>
      <div class="enemy-row" id="enemyRow"></div>
      <div class="combat-mid">
        <div class="energy" id="energyBox" hidden></div>
        <div class="combat-log-head" data-i18n="cmbLogTitle">⚔ 전투 내역</div>
        <div class="combat-log" id="combatLog"></div>
        <div class="action-bar" id="actionBar" hidden></div>
      </div>
      <div class="lord-bar" id="lordBar"></div>
      <div class="combat-hint" id="combatHint">가운데 카드를 선택해 공격하세요</div>
      <div class="combat-board">
        <div class="pile draw-pile" id="drawPile" hidden></div>
        <div class="center-cards hand-row" id="centerCards"></div>
        <div class="pile used-pile" id="usedPile" hidden></div>
      </div>
      <div class="item-bar" id="itemBar" title="소모성 아이템 — 턴당 1개"></div>
      <div class="combat-foot">
        <div class="cf-count"><b id="drawCount">0</b><span data-i18n="cmbDrawCard">뽑을 카드</span></div>
        <button class="btn primary" id="endTurnBtn" data-i18n="uiEndTurn">턴 종료 ▶</button>
        <div class="cf-count used"><b id="usedCount">0</b><span data-i18n="cmbUsedCard">사용 카드</span></div>
      </div>
    </section>
  </main>

  <!-- 장수(출진 덱 편성) — 영웅전과 같은 wr-pop -->
  <div class="wr-pop" id="rosterModal" hidden>
    <div class="wr-pop-scrim" data-close></div>
    <div class="wr-pop-panel">
      <div class="wr-pop-head">
        <img src="assets/img/heroes/ic-general.png?v=1.7.6" alt="">
        <span class="wr-pop-title"><span data-i18n="uiDeckEditTitle">출진 덱 편성</span> <span class="cnt" id="rosterTitleCount"></span></span>
        <button class="wr-pop-x" data-close>✕</button>
      </div>
      <div class="sort-bar" id="rosterSort"><span class="sort-label" data-i18n="uiSort">정렬</span><button class="sort-btn" data-sort="acquire" data-i18n="uiSortAcquire">습득순</button><button class="sort-btn" data-sort="rarity" data-i18n="uiSortRarity">등급</button><button class="sort-btn" data-sort="atk" data-i18n="uiSortAtk">공격력</button></div>
      <div class="wr-pop-body"><div class="party-bar roster-grid" id="rosterGrid"></div></div>
    </div>
  </div>

  <!-- 장비 — 영웅전과 같은 wr-pop -->
  <div class="wr-pop" id="gearModal" hidden>
    <div class="wr-pop-scrim" data-close></div>
    <div class="wr-pop-panel">
      <div class="wr-pop-head">
        <img src="assets/img/heroes/ic-swords.png?v=1.7.6" alt="">
        <span class="wr-pop-title">장비 보유 현황 <span class="cnt" id="gearTitleCount"></span></span>
        <button class="wr-pop-x" data-close>✕</button>
      </div>
      <div class="wr-pop-body"><div class="gear-list" id="gearList"></div></div>
    </div>
  </div>

  <!-- 추가 능력(유물) — 영웅전과 같은 wr-pop -->
  <div class="wr-pop" id="relicModal" hidden>
    <div class="wr-pop-scrim" data-close></div>
    <div class="wr-pop-panel">
      <div class="wr-pop-head">
        <img src="assets/img/heroes/ic-gear.png?v=1.7.6" alt="">
        <span class="wr-pop-title">추가 능력 · 유물 <span class="cnt" id="relicTitleCount"></span></span>
        <button class="wr-pop-x" data-close>✕</button>
      </div>
      <div class="wr-pop-body" id="relicBody"></div>
    </div>
  </div>

  <!-- 도감(장수/장비/유물 탭) — 전체 페이지 -->
  <div class="codex-page" id="codexModal" hidden>
    <div class="codex-page-bar codex-shead">
      <button class="wr-back" id="codexBack" aria-label="뒤로"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#f0c33c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="wr-shead-t"><span data-i18n="uiCodexName">도감</span><img src="assets/img/heroes/ped-codex.png?v=1.7.6" alt=""></div>
      <span class="wr-goldchip codex-pctchip"><span class="pctlbl" data-i18n="uiCollRate">수집률</span> <b id="codexPct">0%</b></span>
    </div>
    <div class="codex-page-body">
      <div class="codex-tabs">
        <button class="codex-tab active" id="codexTabHero" data-tab="hero"><span data-i18n="uiOfficers">장수</span> <span class="ct-count" id="heroColTitle"></span></button>
        <button class="codex-tab" id="codexTabWeapon" data-tab="weapon"><span data-i18n="uiGear">장비</span> <span class="ct-count" id="weaponColTitle"></span></button>
        <button class="codex-tab" id="codexTabRelic" data-tab="relic"><span data-i18n="uiRelics">유물</span> <span class="ct-count" id="relicColTitle"></span></button>
      </div>
      <div id="codexHeroPanel">
        <div class="sort-bar" id="heroColSort"><span class="sort-label" data-i18n="uiSort">정렬</span><button class="sort-btn" data-sort="rarity" data-i18n="uiSortRarity">등급</button><button class="sort-btn" data-sort="atk" data-i18n="uiSortAtk">공격력</button></div>
        <div class="col-grid" id="heroColGrid"></div>
      </div>
      <div id="codexWeaponPanel" hidden>
        <div class="col-weapon-list" id="weaponColList"></div>
      </div>
      <div id="codexRelicPanel" hidden>
        <div class="col-weapon-list" id="relicColList"></div>
      </div>
    </div>
  </div>

  <!-- 도감 상세(장수/장비/유물) 팝업 -->
  <div class="overlay" id="codexDetailModal" hidden style="z-index:140;">
    <div class="modal cdx-pop" style="max-width:300px;text-align:left;padding:0;overflow:hidden;">
      <div id="codexDetailBody"></div>
    </div>
  </div>

  <!-- 보스 정보 (레이드 보라 테마) -->
  <div class="overlay" id="bossModal" hidden>
    <div class="modal bi2-modal" id="bossModalBody"></div>
  </div>

  <!-- 소모품 사용 확인 -->
  <div class="overlay" id="itemConfirm" hidden style="z-index:135;">
    <div class="modal" style="max-width:320px;">
      <div id="itemConfirmBody"></div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:14px;">
        <button class="btn primary" id="itemConfirmYes" data-i18n="uiItemUse">사용</button>
        <button class="btn ghost" id="itemConfirmNo" data-i18n="uiItemCancel">취소</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="overlay" id="overModal" hidden>
    <div class="modal">
      <h2 id="overTitle"></h2>
      <p id="overText"></p>
      <div id="overReward"></div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:8px;">
        <button class="btn primary" id="overAgain" data-i18n="uiToList">목록으로</button>
        <a class="btn ghost" href="index.html" data-i18n="uiMenu">메뉴로</a>
      </div>
    </div>
  </div>

  <script src="js/util.js?v=1.7.6"></script>
  <script src="js/heroes_data.js?v=1.7.6"></script>
  <script src="js/i18n_data.js?v=1.7.6"></script>
  <script src="js/daejang.js?v=1.7.6"></script>
  <script src="js/i18n.js?v=1.7.6"></script>
</body>
</html>
