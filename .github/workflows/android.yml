name: Build Android APK

# 수동 실행(Run workflow / 요청 시)만 — main 푸시로는 자동 빌드하지 않음(웹 배포는 pages.yml이 담당)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install JS dependencies
        run: npm ci

      - name: Build web assets (www/)
        run: npm run build:www

      - name: Capacitor sync (copy web assets into android project)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/three-kingdoms-heroes.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: three-kingdoms-heroes
          path: android/app/build/outputs/apk/debug/three-kingdoms-heroes.apk
          retention-days: 14
          if-no-files-found: error
