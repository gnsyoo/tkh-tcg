<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0b1a">
<title>삼국지 영웅모집 · 목업</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/heroes.css">
</head>
<body>
  <div class="float-menu" id="floatMenu">
    <button class="fm-toggle" id="fmToggle" title="메뉴" aria-label="메뉴">☰</button>
    <div class="fm-panel" id="fmPanel" hidden>
      <div class="fm-title">삼국지 영웅모집</div>
      <div class="fm-info">
        <span class="pill" id="goldPill">💰 0</span>
        <span class="pill" id="floorPill">층 1</span>
        <span class="pill" id="diffPill">난이도</span>
      </div>
      <div class="fm-actions">
        <button class="btn ghost" id="muteBtn">🔊 소리</button>
        <a class="btn ghost" href="index.html">← 메뉴로</a>
      </div>
    </div>
  </div>

  <main class="hw-main" id="hwMain">
    <!-- Map screen -->
    <section class="screen" id="mapScreen">
      <h3 class="screen-title">🗺️ 진행 경로</h3>
      <p class="screen-sub">다음 목적지를 선택하세요</p>
      <div class="map-track" id="mapTrack"></div>
      <div class="map-collect">
        <button class="collect-btn" id="rosterBtn">👥 장수 <b id="rosterCount">0</b></button>
        <button class="collect-btn" id="gearBtn">🗡️ 장비 <b id="gearCount">0</b></button>
      </div>
    </section>

    <!-- Combat screen -->
    <section class="screen" id="combatScreen" hidden>
      <div class="fx-layer" id="fxLayer"></div>
      <div class="enemy-row" id="enemyRow"></div>
      <div class="combat-mid">
        <div class="energy" id="energyBox"></div>
        <div class="combat-log" id="combatLog"></div>
      </div>
      <div class="lord-bar" id="lordBar"></div>
      <div class="combat-board">
        <div class="pile draw-pile" id="drawPile"></div>
        <div class="center-cards" id="centerCards"></div>
        <div class="pile used-pile" id="usedPile"></div>
      </div>
      <div class="action-bar" id="actionBar" hidden></div>
      <div class="combat-foot">
        <span class="hint" id="combatHint">영웅을 선택해 행동하세요</span>
        <button class="btn primary" id="endTurnBtn">턴 종료</button>
      </div>
    </section>

    <!-- Reward screen -->
    <section class="screen" id="rewardScreen" hidden>
      <h3 class="screen-title" id="rewardTitle">🎉 승리!</h3>
      <p class="screen-sub" id="rewardSub">보상을 선택하세요</p>
      <div class="reward-cards" id="rewardCards"></div>
      <button class="btn ghost" id="rewardSkip">건너뛰기 (골드만 받기)</button>
    </section>

    <!-- Rest screen -->
    <section class="screen" id="restScreen" hidden>
      <h3 class="screen-title">🔥 모닥불</h3>
      <p class="screen-sub">잠시 휴식을 취합니다</p>
      <div class="rest-opts">
        <button class="rest-card" id="restHeal"><span class="rc-ico">💖</span><b>휴식</b><small>파티 전원 HP 40% 회복</small></button>
        <button class="rest-card" id="restTrain"><span class="rc-ico">💪</span><b>단련</b><small>영웅 1명 최대 HP +6, 공격력 +2</small></button>
      </div>
      <div class="party-bar" id="restParty"></div>
    </section>

    <!-- Shop screen -->
    <section class="screen" id="shopScreen" hidden>
      <h3 class="screen-title">🛒 상점</h3>
      <p class="screen-sub">골드로 영웅과 보물(무기)을 구매하세요</p>
      <div class="shop-items" id="shopItems"></div>
      <button class="btn primary" id="shopLeave">떠나기</button>
    </section>

    <!-- Treasure / event -->
    <section class="screen" id="eventScreen" hidden>
      <h3 class="screen-title" id="eventTitle">💎 보물</h3>
      <p class="screen-sub" id="eventSub"></p>
      <div class="reward-cards" id="eventChoices"></div>
    </section>
  </main>

  <!-- Continue / new run -->
  <div class="overlay" id="startModal" hidden>
    <div class="modal">
      <h2>🗺️ 모험</h2>
      <p id="startText">진행 중인 모험이 있습니다. 이어서 하시겠어요?</p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn primary" id="continueBtn">이어하기</button>
        <button class="btn ghost" id="newRunBtn">새 모험</button>
      </div>
    </div>
  </div>

  <!-- Game over / victory -->
  <div class="overlay" id="overModal" hidden>
    <div class="modal">
      <h2 id="overTitle"></h2>
      <p id="overText"></p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn primary" id="overAgain">새 모험</button>
        <a class="btn ghost" href="index.html">메뉴로</a>
      </div>
    </div>
  </div>

  <!-- Hero detail tooltip -->
  <div class="overlay" id="heroModal" hidden>
    <div class="modal" id="heroModalBody" style="max-width:340px;"></div>
  </div>

  <!-- 수집한 장수 목록 -->
  <div class="overlay" id="rosterModal" hidden>
    <div class="modal" style="max-width:680px;">
      <h2 style="text-align:center;">👥 수집한 장수 <span id="rosterTitleCount" style="color:var(--gold);font-size:15px;"></span></h2>
      <p class="screen-sub">장수를 탭하면 상세 정보와 무기 장착을 할 수 있습니다</p>
      <div class="party-bar roster-grid" id="rosterGrid"></div>
      <div style="text-align:center;margin-top:12px;"><button class="btn primary" id="rosterClose">닫기</button></div>
    </div>
  </div>

  <!-- 장비 보유 현황 -->
  <div class="overlay" id="gearModal" hidden>
    <div class="modal" style="max-width:560px;">
      <h2 style="text-align:center;">🗡️ 장비 보유 현황</h2>
      <p class="screen-sub">보유한 무기와 착용 중인 장수를 보여줍니다</p>
      <div class="gear-list" id="gearList"></div>
      <div style="text-align:center;margin-top:12px;"><button class="btn primary" id="gearClose">닫기</button></div>
    </div>
  </div>

  <!-- Ending credits (천하통일) -->
  <div class="overlay credits-overlay" id="creditsModal" hidden>
    <div class="credits-stage">
      <div class="credits-roll rolling" id="creditsRoll"></div>
    </div>
    <div class="credits-actions">
      <button class="btn ghost" id="creditsSkip">⏸ 멈춤/재생</button>
      <button class="btn primary" id="creditsAgain">새 모험</button>
      <a class="btn ghost" href="index.html">메뉴로</a>
    </div>
  </div>

  <script src="js/util.js"></script>
  <script src="js/heroes_data.js"></script>
  <script src="js/heroes.js"></script>
</body>
</html>
