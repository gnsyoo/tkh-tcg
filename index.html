<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0b1a">
<title>삼국지 카드 게임</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/home.css">
</head>
<body class="home-body">
  <div class="home-wrap">
    <header class="home-header">
      <h1 class="home-title">⚔️ 삼국지 <span>카드 게임</span></h1>
    </header>

    <section class="diff-section">
      <h2 class="section-label">난이도 선택</h2>
      <div class="diff-picker" id="diffPicker">
        <button class="diff-btn" data-diff="easy">하 <small>Easy</small></button>
        <button class="diff-btn active" data-diff="normal">중 <small>Normal</small></button>
        <button class="diff-btn" data-diff="hard">상 <small>Hard</small></button>
      </div>
    </section>

    <section class="games-grid">
      <a class="game-card heroes" id="cardHeroes" href="heroes.html">
        <div class="game-art">⚔️🐎🏯</div>
        <h3>삼국지 영웅모집</h3>
        <p class="game-tag">로그라이크 군담</p>
        <p class="game-desc">장수를 모집해 부대를 꾸리고 진군 경로를 헤쳐가는 턴제 전투. 황건적과 군벌을 격파하고 동탁·여포 등 보스를 토벌하세요.</p>
        <span class="play-pill">출진 ▶</span>
      </a>

      <a class="game-card queens" id="cardQueens" href="queensblood.html">
        <div class="game-art">🀄⚔️👑</div>
        <h3>히어로즈 블러드</h3>
        <p class="game-tag">보드 카드 대전</p>
        <p class="game-desc">진영(3×5·4×5 선택)에 장수 카드를 배치해 영역을 넓히고, <b>배치한 카드의 무력 총합</b>이 높은 쪽이 승리하는 전략 카드 대전. 덱 빌더(장수 카드 44종)로 15장 덱을 짜고, 대전 결과는 영웅모집 <b>골드로 정산</b>됩니다.</p>
        <span class="play-pill">대전 ▶</span>
      </a>
    </section>
  </div>

  <script>
    (function () {
      var diff = localStorage.getItem('tcg_difficulty') || 'normal';
      function applyDiff(d) {
        diff = d;
        localStorage.setItem('tcg_difficulty', d);
        document.querySelectorAll('.diff-btn').forEach(function (b) {
          b.classList.toggle('active', b.dataset.diff === d);
        });
        updateLinks();
      }
      function updateLinks() {
        document.getElementById('cardHeroes').setAttribute('href', 'heroes.html?diff=' + diff);
        document.getElementById('cardQueens').setAttribute('href', 'queensblood.html?diff=' + diff);
      }
      document.getElementById('diffPicker').addEventListener('click', function (e) {
        var btn = e.target.closest('.diff-btn');
        if (btn) applyDiff(btn.dataset.diff);
      });
      applyDiff(diff);
    })();
  </script>
</body>
</html>
